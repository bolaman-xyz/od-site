<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products | OD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #a0a0b0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.035) 49px, rgba(255,255,255,0.035) 50px),
                repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.035) 49px, rgba(255,255,255,0.035) 50px);
        }

        /* Sidebar */
        .sidebar {
            width: 240px; flex-shrink: 0;
            background: rgba(8,8,14,0.92);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255,255,255,0.04);
            display: flex; flex-direction: column;
            padding: 24px 0 16px;
            position: fixed; top: 0; left: 0; bottom: 0;
            z-index: 10;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 12px;
            padding: 0 24px; margin-bottom: 32px;
        }
        .logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800; color: #fff;
            box-shadow: 0 4px 12px rgba(124,58,237,0.25);
        }
        .logo-name { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }

        .sidebar-section {
            font-size: 10px; font-weight: 600; color: #3a3a50;
            text-transform: uppercase; letter-spacing: 1.4px;
            padding: 0 24px; margin-bottom: 8px; margin-top: 24px;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 24px;
            margin: 2px 12px;
            border-radius: 8px;
            font-size: 13.5px; font-weight: 500; color: #5a5a72;
            text-decoration: none;
            transition: all 0.15s;
        }
        .sidebar-link:hover { color: #c0c0d4; background: rgba(255,255,255,0.03); }
        .sidebar-link.active {
            color: #fff;
            background: rgba(139,92,246,0.1);
        }
        .sidebar-link.active svg { color: #8b5cf6; }
        .sidebar-link svg { width: 18px; height: 18px; flex-shrink: 0; }

        .sidebar-divider {
            height: 1px;
            background: rgba(255,255,255,0.04);
            margin: 16px 24px;
        }

        .sidebar-bottom {
            margin-top: auto;
            padding: 16px 20px;
            margin: 0 12px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex; align-items: center; gap: 12px;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(139,92,246,0.12);
            border: 2px solid rgba(139,92,246,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; color: #8b5cf6;
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 13px; font-weight: 600; color: #e0e0ee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-sub { font-size: 10px; color: #4a4a60; margin-top: 1px; }
        .logout-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px; cursor: pointer;
            color: #444458; transition: all 0.15s; padding: 6px;
            display: flex; align-items: center; justify-content: center;
        }
        .logout-btn:hover { color: #ef4444; background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.15); }
        .logout-btn svg { width: 15px; height: 15px; }

        /* Main */
        .main {
            flex: 1; margin-left: 240px;
        }
        .main-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .main-header h1 {
            font-size: 20px; font-weight: 700; color: #fff;
        }
        .email-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 18px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: #b0b0c8;
            font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
        }
        .email-btn:hover { border-color: rgba(255,255,255,0.2); color: #e0e0ee; }
        .email-btn svg { width: 14px; height: 14px; }

        .main-content {
            padding: 28px 32px;
        }

        /* Empty state */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 100px 20px;
            text-align: center;
        }
        .empty-icon {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            color: #444458;
        }
        .empty-icon svg { width: 24px; height: 24px; }
        .empty-state h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px; }
        .empty-state p { font-size: 13px; color: #555568; margin-bottom: 22px; max-width: 300px; }
        .empty-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 22px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; color: #b0b0c8;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
        }
        .empty-btn:hover { border-color: rgba(255,255,255,0.15); color: #e0e0ee; }
        .empty-btn svg { width: 16px; height: 16px; }

        /* Product cards */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }
        .product-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .product-card:hover { border-color: rgba(255,255,255,0.1); }
        .product-top {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 14px;
        }
        .product-icon {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; overflow: hidden;
        }
        .product-icon img { width: 100%; height: 100%; object-fit: cover; }
        .product-status {
            display: flex; align-items: center; gap: 5px;
            font-size: 10.5px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .product-status .dot { width: 6px; height: 6px; border-radius: 50%; }
        .ps-green { color: #34d399; }
        .ps-green .dot { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.4); }
        .ps-yellow { color: #fbbf24; }
        .ps-yellow .dot { background: #fbbf24; box-shadow: 0 0 6px rgba(251,191,36,0.4); }

        .product-name { font-size: 14px; font-weight: 600; color: #eeeef4; margin-bottom: 3px; }
        .product-desc { font-size: 12px; color: #444458; margin-bottom: 14px; line-height: 1.5; }

        .product-meta {
            display: flex; gap: 14px; margin-bottom: 16px;
        }
        .pm { font-size: 11px; color: #3e3f55; display: flex; align-items: center; gap: 4px; }
        .pm svg { width: 12px; height: 12px; }

        .product-bottom {
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex; align-items: center; justify-content: space-between;
        }
        .product-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .ptag {
            padding: 3px 8px; border-radius: 5px;
            font-size: 10px; font-weight: 600;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: #777790;
        }
        .dl-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            background: #7c3aed; color: #fff;
            border: none; border-radius: 7px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit; text-decoration: none;
            transition: background 0.15s, transform 0.1s;
        }
        .dl-btn:hover { background: #6d28d9; transform: translateY(-1px); }
        .dl-btn svg { width: 14px; height: 14px; }

        /* Email modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            width: 100%; max-width: 420px;
            background: #111118;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 28px;
        }
        .modal h2 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .modal p { font-size: 12.5px; color: #555568; margin-bottom: 18px; }
        .modal input {
            width: 100%; padding: 11px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px; color: #d0d0de; font-size: 13px;
            font-family: inherit; outline: none;
            margin-bottom: 14px;
        }
        .modal input:focus { border-color: rgba(255,255,255,0.15); }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btn {
            padding: 9px 18px; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit; border: none; transition: all 0.15s;
        }
        .btn-cancel { background: rgba(255,255,255,0.04); color: #555568; }
        .btn-cancel:hover { color: #8888a0; }
        .btn-go { background: #7c3aed; color: #fff; }
        .btn-go:hover { background: #6d28d9; }

        .loading-spinner {
            display: flex; align-items: center; justify-content: center;
            padding: 60px; color: #444458; font-size: 13px;
        }

        /* Email prompt (shown after Discord login) */
        .email-prompt {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 20px;
            text-align: center;
        }
        .email-prompt-icon {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            color: #444458;
        }
        .email-prompt-icon svg { width: 24px; height: 24px; }
        .email-prompt h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px; }
        .email-prompt p { font-size: 13px; color: #555568; margin-bottom: 22px; max-width: 340px; }
        .email-prompt-form {
            display: flex; gap: 8px; width: 100%; max-width: 400px;
        }
        .email-prompt-form input {
            flex: 1; padding: 11px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px; color: #d0d0de; font-size: 13px;
            font-family: inherit; outline: none;
        }
        .email-prompt-form input:focus { border-color: rgba(255,255,255,0.15); }
        .email-prompt-form button {
            padding: 11px 22px;
            background: #7c3aed; color: #fff;
            border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: background 0.15s;
            white-space: nowrap;
        }
        .email-prompt-form button:hover { background: #6d28d9; }

        @media (max-width: 768px) {
            .sidebar { width: 64px; padding: 16px 0; }
            .sidebar-logo { padding: 0; justify-content: center; }
            .logo-name, .sidebar-section, .sidebar-link span, .user-info, .sidebar-divider { display: none; }
            .sidebar-link { justify-content: center; padding: 10px; margin: 2px 8px; }
            .sidebar-bottom { padding: 10px; margin: 0 4px; justify-content: center; }
            .main { margin-left: 64px; }
            .main-header { padding: 20px; }
            .main-content { padding: 20px; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">OD</div>
        <span class="logo-name">OD</span>
    </div>

    <div class="sidebar-section">License</div>
    <a href="#" class="sidebar-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
        <span>My Products</span>
    </a>

    <div class="sidebar-section">Community</div>
    <a href="#" class="sidebar-link" id="discordLink">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
        <span>Discord Server</span>
    </a>

    <div class="sidebar-bottom" id="userSection">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
            <div class="user-name" id="userName">Guest</div>
            <div class="user-sub" id="userSub">Not signed in</div>
        </div>
        <button class="logout-btn" onclick="signOut()" title="Sign out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
    </div>
</div>

<!-- Main -->
<div class="main">
    <div class="main-header">
        <h1>My Products</h1>
        <button class="email-btn" onclick="openEmailModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
            Lookup by Email
        </button>
    </div>

    <div class="main-content" id="content">
        <div class="loading-spinner">Loading your products...</div>
    </div>
</div>

<!-- Email Modal -->
<div class="modal-overlay" id="emailModal">
    <div class="modal">
        <h2>Find your products</h2>
        <p>Enter the email you used when purchasing to find your downloads.</p>
        <input type="email" id="lookupEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLookup()">
        <div class="modal-btns">
            <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-btn btn-go" onclick="doLookup()">Look up</button>
        </div>
    </div>
</div>

<script>
let token = '';
let user = null;

const DL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>';
const KEY_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15.5 7.5 2.3-2.3a1 1 0 0 1 1.4 0l1.1 1.1a1 1 0 0 1 0 1.4L18 10"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>';
const BOX_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>';

const MAIL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="m2 7 10 7 10-7"/></svg>';

function showEmailPrompt() {
    document.getElementById('content').innerHTML = `
        <div class="email-prompt">
            <div class="email-prompt-icon">${MAIL_SVG}</div>
            <h2>Enter your email</h2>
            <p>Enter the email you used when purchasing to view your downloads.</p>
            <div class="email-prompt-form">
                <input type="email" id="promptEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')submitEmail()">
                <button onclick="submitEmail()">Look up</button>
            </div>
        </div>`;
    setTimeout(() => { const el = document.getElementById('promptEmail'); if (el) el.focus(); }, 100);
}

async function submitEmail() {
    const email = document.getElementById('promptEmail').value.trim();
    if (!email) return;
    document.getElementById('content').innerHTML = '<div class="loading-spinner">Looking up products...</div>';
    try {
        const res = await fetch('/api/lookup', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        renderProducts(data.products || []);
    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading-spinner">Lookup failed. Try again.</div>';
    }
}

function renderProducts(products) {
    const el = document.getElementById('content');
    if (!products || products.length === 0) {
        el.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">${BOX_SVG}</div>
                <h2>No products yet</h2>
                <p>Redeem a license key to gain access to the loader.</p>
                <button class="empty-btn" onclick="openEmailModal()">
                    ${KEY_SVG}
                    Lookup by Email
                </button>
            </div>`;
        return;
    }

    el.innerHTML = '<div class="product-grid">' + products.map(p => {
        const name = p.name || 'Untitled';
        const desc = p.description ? p.description.replace(/<[^>]*>/g, '').substring(0, 100) : '';
        const img = p.image_url || p.cloudflare_image_id || '';
        const statusText = p.status_text || 'Available';
        const st = statusText.toLowerCase();
        const statusClass = (st.includes('updat') || st.includes('offline')) ? 'ps-yellow' : 'ps-green';
        const dlLink = p.download_link || '';
        const variants = p.variants || [];
        const badgeText = p.badge_text || '';
        const purchased = p.purchased_at ? new Date(p.purchased_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';

        let imgHtml = img
            ? `<div class="product-icon"><img src="${img}" alt=""></div>`
            : `<div class="product-icon">${BOX_SVG}</div>`;

        let btnHtml;
        if (st.includes('updat')) {
            btnHtml = `<button class="dl-btn" style="background:rgba(255,255,255,0.04);color:#444458;cursor:default;">Updating...</button>`;
        } else if (dlLink) {
            btnHtml = `<a href="${dlLink}" target="_blank" class="dl-btn">${DL_SVG} Download</a>`;
        } else {
            btnHtml = `<button class="dl-btn">${DL_SVG} Download</button>`;
        }

        let tagsHtml = '';
        if (badgeText) tagsHtml += `<span class="ptag">${badgeText}</span>`;
        variants.forEach(v => { if (v.name) tagsHtml += `<span class="ptag">${v.name}</span>`; });

        return `
            <div class="product-card">
                <div class="product-top">
                    ${imgHtml}
                    <div class="product-status ${statusClass}"><span class="dot"></span>${statusText}</div>
                </div>
                <div class="product-name">${name}</div>
                <div class="product-desc">${desc}</div>
                <div class="product-meta">
                    ${purchased ? `<span class="pm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>${purchased}</span>` : ''}
                </div>
                <div class="product-bottom">
                    <div class="product-tags">${tagsHtml}</div>
                    ${btnHtml}
                </div>
            </div>`;
    }).join('') + '</div>';
}

function updateUser(data) {
    user = data;
    document.getElementById('userName').textContent = data.global_name || data.username || data.email || 'Guest';
    document.getElementById('userSub').textContent = data.email ? 'Authenticated' : 'Email lookup';
    if (data.avatar) {
        document.getElementById('userAvatar').innerHTML = `<img src="${data.avatar}" alt="">`;
    } else {
        document.getElementById('userAvatar').textContent = (data.global_name || data.username || '?')[0].toUpperCase();
    }
}

async function loadProducts() {
    try {
        const res = await fetch('/api/my-products', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) { signOut(); return; }
        const data = await res.json();
        renderProducts(data.products || []);
    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading-spinner">Failed to load products.</div>';
    }
}

async function doLookup() {
    const email = document.getElementById('lookupEmail').value.trim();
    if (!email) return;
    closeModal();
    document.getElementById('content').innerHTML = '<div class="loading-spinner">Looking up products...</div>';

    try {
        const res = await fetch('/api/lookup', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        renderProducts(data.products || []);
    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading-spinner">Lookup failed. Try again.</div>';
    }
}

function openEmailModal() { document.getElementById('emailModal').classList.add('show'); document.getElementById('lookupEmail').focus(); }
function closeModal() { document.getElementById('emailModal').classList.remove('show'); }

function signOut() {
    localStorage.removeItem('od_token');
    window.location.href = '/';
}

(async () => {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    if (params.has('token')) {
        token = params.get('token');
        localStorage.setItem('od_token', token);
        history.replaceState(null, '', '/dashboard');
    } else if (params.has('email')) {
        const email = params.get('email');
        history.replaceState(null, '', '/dashboard');
        token = 'email_' + btoa(email);
        localStorage.setItem('od_token', token);
        updateUser({ email, global_name: email.split('@')[0] });
        document.getElementById('content').innerHTML = '<div class="loading-spinner">Looking up your products...</div>';
        try {
            const res = await fetch('/api/lookup', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            if (res.status === 401) {
                renderProducts([]);
            } else {
                const data = await res.json();
                renderProducts(data.products || []);
            }
        } catch(e) { renderProducts([]); }
        return;
    } else {
        token = localStorage.getItem('od_token') || '';
    }

    if (!token) { window.location.href = '/'; return; }

    try {
        const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token }});
        if (res.ok) {
            const data = await res.json();
            updateUser(data);
            showEmailPrompt();
        } else {
            localStorage.removeItem('od_token');
            window.location.href = '/';
        }
    } catch(e) {
        showEmailPrompt();
    }
})();
</script>
