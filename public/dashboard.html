<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products | OD</title>
    <link rel="icon" type="image/png" href="/pfp.png">


    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #8b5cf6;
            --accent-2: #6d28d9;
            --accent-glow: rgba(139,92,246,0.5);
            --font-display: 'Space Grotesk', 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: rgba(139,92,246,0.35); color: #fff; }
        body {
            background: #06060a;
            color: #a0a0b0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }
        /* Animated aurora background */
        .aurora {
            position: fixed; inset: 0; z-index: -2; overflow: hidden;
            background: #06060a;
        }
        .aurora::before, .aurora::after {
            content: ''; position: absolute; border-radius: 50%;
            filter: blur(90px); opacity: 0.5;
        }
        .aurora::before {
            width: 700px; height: 700px; top: -250px; left: -150px;
            background: radial-gradient(circle, rgba(124,58,237,0.35), transparent 65%);
            animation: drift1 22s ease-in-out infinite;
        }
        .aurora::after {
            width: 600px; height: 600px; bottom: -220px; right: -120px;
            background: radial-gradient(circle, rgba(88,60,220,0.28), transparent 65%);
            animation: drift2 26s ease-in-out infinite;
        }
        .aurora-orb {
            position: fixed; z-index: -2; border-radius: 50%; filter: blur(100px);
            width: 500px; height: 500px; top: 30%; left: 45%;
            background: radial-gradient(circle, rgba(150,80,255,0.14), transparent 60%);
            animation: drift3 30s ease-in-out infinite;
        }
        @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(120px,80px)} }
        @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-100px,-60px)} }
        @keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-80px,50px) scale(1.15)} }
        .grid-overlay {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 54px, rgba(255,255,255,0.02) 54px, rgba(255,255,255,0.02) 55px),
                repeating-linear-gradient(90deg, transparent, transparent 54px, rgba(255,255,255,0.02) 54px, rgba(255,255,255,0.02) 55px);
            mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, #000 40%, transparent 100%);
        }

        /* Sidebar */
        .sidebar {
            width: 262px; flex-shrink: 0;
            background: rgba(10,10,16,0.55);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex; flex-direction: column;
            padding: 26px 0 16px;
            position: fixed; top: 0; left: 0; bottom: 0;
            z-index: 10;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 13px;
            padding: 0 24px; margin-bottom: 38px;
        }
        .logo-icon {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, rgba(139,92,246,0.18), rgba(109,40,217,0.08));
            border: 1px solid rgba(139,92,246,0.25);
            box-shadow: 0 0 24px rgba(139,92,246,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
            padding: 6px;
        }
        .logo-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .logo-name { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.4px; }

        .sidebar-section {
            font-size: 10.5px; font-weight: 700; color: #4a4a66;
            text-transform: uppercase; letter-spacing: 1.4px;
            padding: 0 26px; margin-bottom: 8px; margin-top: 26px;
        }
        .sidebar-section:first-of-type { margin-top: 0; }
        .sidebar-link {
            position: relative;
            display: flex; align-items: center; gap: 12px;
            padding: 11px 16px;
            margin: 3px 14px;
            border-radius: 11px;
            font-size: 14px; font-weight: 500; color: #7a7a95;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        .sidebar-link:hover { color: #d8d8ea; background: rgba(255,255,255,0.04); transform: translateX(2px); }
        .sidebar-link.active {
            color: #fff; font-weight: 600;
            background: linear-gradient(90deg, rgba(139,92,246,0.16), rgba(139,92,246,0.04));
            box-shadow: inset 0 0 0 1px rgba(139,92,246,0.22);
        }
        .sidebar-link.active::before {
            content: ''; position: absolute; left: -14px; top: 50%; transform: translateY(-50%);
            width: 3px; height: 20px; border-radius: 2px;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .sidebar-link svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.65; transition: opacity 0.2s; }
        .sidebar-link:hover svg, .sidebar-link.active svg { opacity: 1; }

        .sidebar-bottom {
            margin-top: auto;
            margin: auto 14px 0;
            padding: 14px 12px;
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: #fff;
            overflow: hidden; flex-shrink: 0;
            box-shadow: 0 0 16px rgba(139,92,246,0.3);
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 13px; font-weight: 600; color: #e8e8f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-sub { font-size: 10.5px; color: #6a6a82; margin-top: 2px; }
        .logout-btn {
            background: none; border: none; cursor: pointer;
            color: #55556e; transition: all 0.2s; padding: 6px; border-radius: 8px;
        }
        .logout-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }
        .logout-btn svg { width: 16px; height: 16px; }

        /* Main */
        .main {
            flex: 1; margin-left: 262px; position: relative; z-index: 1;
        }
        .main-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 26px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(6,6,10,0.4);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 5;
        }
        .main-header h1 {
            font-family: var(--font-display);
            font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px;
        }
        .email-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 18px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 9px; color: #b0b0c8;
            font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
        }
        .email-btn:hover { border-color: rgba(255,255,255,0.2); color: #e0e0ee; }
        .email-btn svg { width: 14px; height: 14px; }

        .main-content {
            padding: 32px 40px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Empty state */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 100px 20px;
            text-align: center;
        }
        .empty-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(255,255,255,0.02));
            border: 1px solid rgba(139,92,246,0.18);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
            color: var(--accent);
            box-shadow: 0 0 30px rgba(139,92,246,0.15);
        }
        .empty-icon svg { width: 28px; height: 28px; }
        .empty-state h2 { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .empty-state p { font-size: 13px; color: #6a6a82; margin-bottom: 24px; max-width: 320px; line-height: 1.6; }
        .empty-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none;
            border-radius: 10px; color: #fff;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
            box-shadow: 0 8px 24px rgba(139,92,246,0.3);
        }
        .empty-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(139,92,246,0.42); }
        .empty-btn svg { width: 16px; height: 16px; }

        /* Product cards */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 18px;
        }
        .product-card {
            position: relative;
            background: linear-gradient(160deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015));
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 22px;
            transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
        }
        .product-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139,92,246,0.5), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .product-card:hover {
            border-color: rgba(139,92,246,0.3);
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 30px rgba(139,92,246,0.1);
        }
        .product-card:hover::before { opacity: 1; }
        .product-top {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 16px;
        }
        .product-icon {
            width: 46px; height: 46px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; overflow: hidden; color: var(--accent);
        }
        .product-icon img { width: 100%; height: 100%; object-fit: cover; }
        .product-status {
            display: flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
            padding: 5px 10px; border-radius: 20px;
        }
        .product-status .dot { width: 6px; height: 6px; border-radius: 50%; }
        .ps-green { color: #34d399; background: rgba(52,211,153,0.1); }
        .ps-green .dot { background: #34d399; box-shadow: 0 0 8px rgba(52,211,153,0.6); animation: pulse 2s infinite; }
        .ps-yellow { color: #fbbf24; background: rgba(251,191,36,0.1); }
        .ps-yellow .dot { background: #fbbf24; box-shadow: 0 0 8px rgba(251,191,36,0.6); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .product-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: #f4f4fa; margin-bottom: 4px; letter-spacing: -0.3px; }
        .product-desc { font-size: 12.5px; color: #55556e; margin-bottom: 16px; line-height: 1.5; }

        .product-meta {
            display: flex; gap: 14px; margin-bottom: 16px;
        }
        .pm { font-size: 11px; color: #55556e; display: flex; align-items: center; gap: 5px; }
        .pm svg { width: 12px; height: 12px; }

        .product-bottom {
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .product-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .ptag {
            padding: 4px 9px; border-radius: 6px;
            font-size: 10px; font-weight: 600;
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.15);
            color: #a78bda;
        }
        .dl-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 9px 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            border: none; border-radius: 9px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit; text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(139,92,246,0.28);
            flex-shrink: 0;
        }
        .dl-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(139,92,246,0.42); }
        .dl-btn svg { width: 14px; height: 14px; }

        /* Email modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
        .modal {
            width: 100%; max-width: 420px;
            background: linear-gradient(160deg, #14141d, #0d0d14);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px; padding: 30px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6);
        }
        .modal h2 { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .modal p { font-size: 12.5px; color: #6a6a82; margin-bottom: 20px; line-height: 1.5; }
        .modal input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; color: #e0e0ee; font-size: 13px;
            font-family: inherit; outline: none;
            margin-bottom: 16px; transition: all 0.2s;
        }
        .modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btn {
            padding: 10px 20px; border-radius: 10px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit; border: none; transition: all 0.2s;
        }
        .btn-cancel { background: rgba(255,255,255,0.05); color: #8888a0; }
        .btn-cancel:hover { color: #c0c0d0; background: rgba(255,255,255,0.08); }
        .btn-go { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 4px 14px rgba(139,92,246,0.3); }
        .btn-go:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(139,92,246,0.42); }

        .loading-spinner {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 80px; color: #55556e; font-size: 13px;
        }
        .loading-spinner::before {
            content: ''; width: 18px; height: 18px;
            border: 2px solid rgba(139,92,246,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Email prompt (shown after Discord login) */
        .email-prompt {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 20px;
            text-align: center;
        }
        .email-prompt-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(255,255,255,0.02));
            border: 1px solid rgba(139,92,246,0.18);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
            color: var(--accent);
            box-shadow: 0 0 30px rgba(139,92,246,0.15);
        }
        .email-prompt-icon svg { width: 28px; height: 28px; }
        .email-prompt h2 { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .email-prompt p { font-size: 13px; color: #6a6a82; margin-bottom: 24px; max-width: 360px; line-height: 1.6; }
        .email-prompt-form {
            display: flex; gap: 10px; width: 100%; max-width: 420px;
        }
        .email-prompt-form input {
            flex: 1; padding: 13px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 11px; color: #e0e0ee; font-size: 13px;
            font-family: inherit; outline: none; transition: all 0.2s;
        }
        .email-prompt-form input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
        .email-prompt-form button {
            padding: 13px 26px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            border: none; border-radius: 11px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(139,92,246,0.3);
        }
        .email-prompt-form button:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(139,92,246,0.42); }

        /* Guide view */
        .guide-view {
            max-width: 900px;
            background: linear-gradient(160deg, rgba(14,14,20,0.9), rgba(9,9,13,0.85));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 38px 42px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .guide-header { margin-bottom: 28px; }
        .guide-header h1 { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 8px; letter-spacing: -0.5px; }
        .guide-header p { font-size: 14px; color: #6a6a82; line-height: 1.5; margin: 0; }

        .guide-tabs-wrapper { position: relative; margin-bottom: 8px; }
        .guide-tabs-scroll-row { display: flex; align-items: center; }
        .guide-tab-arrow { flex-shrink: 0; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: none; border: none; color: #55556e; cursor: pointer; transition: all 0.15s; opacity: 0; pointer-events: none; }
        .guide-tab-arrow.visible { opacity: 1; pointer-events: auto; }
        .guide-tab-arrow:hover { background: rgba(139,92,246,0.12); color: var(--accent); }
        .guide-tab-arrow svg { width: 14px; height: 14px; }
        .guide-tabs {
            display: flex; gap: 4px; flex: 1;
            overflow-x: auto; padding-bottom: 0;
            scrollbar-width: none;
        }
        .guide-tabs::-webkit-scrollbar { display: none; }
        .guide-tab {
            padding: 10px 18px; border-radius: 11px;
            font-size: 13px; font-weight: 500; color: #6a6a82;
            background: transparent; border: 1px solid transparent;
            cursor: pointer; font-family: inherit; transition: all 0.2s;
            white-space: nowrap; display: flex; align-items: center; gap: 8px;
        }
        .guide-tab:hover { color: #c0c0d0; background: rgba(255,255,255,0.04); }
        .guide-tab.active {
            color: #fff; font-weight: 600;
            background: linear-gradient(135deg, rgba(139,92,246,0.18), rgba(139,92,246,0.06));
            border-color: rgba(139,92,246,0.25);
        }
        .guide-tab svg { width: 15px; height: 15px; opacity: 0.6; }
        .guide-tab.active svg { opacity: 1; }

        .guide-progress {
            height: 4px; background: rgba(255,255,255,0.05);
            border-radius: 2px; margin: 18px 0 28px;
            overflow: hidden;
        }
        .guide-progress-bar {
            height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .guide-step-label {
            display: inline-flex; align-items: center; gap: 8px;
            margin-bottom: 16px;
        }
        .guide-step-label .step-num {
            font-size: 11px; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            padding: 5px 12px; border-radius: 6px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(139,92,246,0.3);
        }
        .guide-step-label .step-of {
            font-size: 11px; font-weight: 600; color: #55556e;
            letter-spacing: 0.5px;
        }

        .guide-view h2 {
            font-family: var(--font-display);
            font-size: 22px; font-weight: 700; color: #fff;
            margin-bottom: 12px; letter-spacing: -0.4px;
        }
        .guide-view .guide-desc {
            font-size: 14.5px; color: #8888a0; line-height: 1.7;
            margin-bottom: 24px;
        }
        .guide-view ul {
            list-style: none; padding: 0; margin-bottom: 28px;
        }
        .guide-view ul li {
            padding: 10px 0 10px 26px; position: relative;
            font-size: 14.5px; color: #8888a0; line-height: 1.6;
        }
        .guide-view ul li::before {
            content: ''; position: absolute; left: 4px; top: 17px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .guide-view ul li strong { color: #e8e8f4; font-weight: 600; }

        .guide-img {
            display: block; max-width: 100%; height: auto;
            border-radius: 14px; border: 1px solid rgba(255,255,255,0.1);
            margin: 0 0 24px; cursor: zoom-in;
            transition: all 0.2s;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        .guide-img:hover { border-color: rgba(139,92,246,0.35); transform: scale(1.01); }

        .guide-info-box {
            padding: 18px 22px; border-radius: 14px;
            background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(139,92,246,0.03));
            border: 1px solid rgba(139,92,246,0.2);
            font-size: 13.5px; color: #b0a8d0; margin-bottom: 24px;
            line-height: 1.6;
        }
        .guide-dl-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 13px 26px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none;
            border-radius: 12px; color: #fff;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 8px 24px rgba(139,92,246,0.3);
        }
        .guide-dl-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(139,92,246,0.42); }
        .guide-dl-btn svg { width: 16px; height: 16px; }

        @media (max-width: 768px) {
            .sidebar { width: 66px; padding: 16px 0; }
            .sidebar-logo { padding: 0; justify-content: center; }
            .logo-name, .sidebar-section, .sidebar-link span, .user-info, .sidebar-divider { display: none; }
            .sidebar-link { justify-content: center; padding: 11px; margin: 3px 10px; }
            .sidebar-link.active::before { display: none; }
            .sidebar-bottom { padding: 10px; margin: auto 8px 0; justify-content: center; }
            .main { margin-left: 66px; }
            .main-header { padding: 20px; }
            .main-content { padding: 20px; }
            .product-grid { grid-template-columns: 1fr; }
            .guide-view { padding: 26px 22px; }
        }
    </style>
</head>
<body>

<div class="aurora"></div>
<div class="aurora-orb"></div>
<div class="grid-overlay"></div>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon"><img src="/pfp.png" alt="OD"></div>
        <span class="logo-name">OD Services</span>
    </div>

    <div class="sidebar-section">License</div>
    <a href="#" class="sidebar-link active" onclick="showProductsView();return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
        <span>My Products</span>
    </a>
    <a href="#" class="sidebar-link" onclick="changeEmail();return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        <span>Use a different email</span>
    </a>

    <div id="docsSection" style="display:none">
        <div class="sidebar-section">Documentation</div>
        <div id="docsLinks"></div>
    </div>

    <div class="sidebar-section">Community</div>
    <a href="#" class="sidebar-link" id="discordLink">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
        <span>Discord Server</span>
    </a>

    <div class="sidebar-bottom" id="userSection">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
            <div class="user-name" id="userName">Guest</div>
            <div class="user-sub" id="userSub">Not signed in</div>
        </div>
        <button class="logout-btn" onclick="signOut()" title="Sign out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
    </div>
</div>

<!-- Main -->
<div class="main">
    <div class="main-header">
        <h1>My Products</h1>
    </div>

    <div class="main-content" id="content">
        <div class="loading-spinner">Loading your products...</div>
    </div>
</div>

<!-- Email Modal -->
<div class="modal-overlay" id="emailModal">
    <div class="modal">
        <h2>Find your products</h2>
        <p>Enter the email you used when purchasing to find your downloads.</p>
        <input type="email" id="lookupEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLookup()">
        <div class="modal-btns">
            <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-btn btn-go" onclick="doLookup()">Look up</button>
        </div>
    </div>
</div>

<script>
let token = '';
let user = null;
let loadedProducts = [];
let guidesData = {};

const DL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>';
const KEY_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15.5 7.5 2.3-2.3a1 1 0 0 1 1.4 0l1.1 1.1a1 1 0 0 1 0 1.4L18 10"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>';
const BOX_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>';

const MAIL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="m2 7 10 7 10-7"/></svg>';

function showEmailPrompt() {
    document.getElementById('content').innerHTML = `
        <div class="email-prompt">
            <div class="email-prompt-icon">${MAIL_SVG}</div>
            <h2>Enter your email</h2>
            <p>Enter the email you used when purchasing to view your downloads.</p>
            <div class="email-prompt-form">
                <input type="email" id="promptEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')submitEmail()">
                <button onclick="submitEmail()">Look up</button>
            </div>
        </div>`;
    setTimeout(() => { const el = document.getElementById('promptEmail'); if (el) el.focus(); }, 100);
}

async function submitEmail() {
    const email = document.getElementById('promptEmail').value.trim();
    if (!email) return;
    document.getElementById('content').innerHTML = '<div class="loading-spinner">Looking up products...</div>';
    await loadGuides();
    try {
        const res = await fetch('/api/lookup', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        renderProducts(data.products || []);
    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading-spinner">Lookup failed. Try again.</div>';
    }
}

const GUIDE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>';
const PRODUCTS_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>';

async function loadGuides() {
    try {
        const res = await fetch('/api/guides');
        guidesData = await res.json();
    } catch(e) { guidesData = {}; }
}

function showGuideLinks(products) {
    const docsSection = document.getElementById('docsSection');
    const docsLinks = document.getElementById('docsLinks');
    if (!products || products.length === 0) { docsSection.style.display = 'none'; return; }

    const guideKeys = Object.keys(guidesData);
    const matchedGuides = [];

    for (const p of products) {
        const pid = String(p._id || p.id);
        const pName = (p.name || '').toLowerCase();
        let found = null;
        for (const key of guideKeys) {
            const guide = guidesData[key];
            if (!guide) continue;
            const gName = (guide.title || key).toLowerCase();
            const idMatch = guide.productId && String(guide.productId) === pid;
            const nameMatch = pName && (pName.includes(gName) || gName.includes(pName) || key.toLowerCase().includes(pName.replace(/\s+/g, '-')));
            if (idMatch || nameMatch) { found = { key, title: guide.title || key }; break; }
        }
        if (!found) found = { key: '__product_' + pid, title: (p.name || 'Product') + ' Guide', productName: p.name };
        if (!matchedGuides.find(m => m.key === found.key)) matchedGuides.push(found);
    }

    if (matchedGuides.length === 0) { docsSection.style.display = 'none'; return; }

    docsSection.style.display = 'block';
    docsLinks.innerHTML = matchedGuides.map(g =>
        `<a href="#" class="sidebar-link" onclick="showGuide('${g.key}');return false;">
            ${GUIDE_SVG}
            <span>${g.title}</span>
        </a>`
    ).join('');
}

function setActiveLink(el) {
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    if (el) el.classList.add('active');
}

function showProductsView() {
    setActiveLink(document.querySelector('.sidebar-link'));
    document.querySelector('.main-header h1').textContent = 'My Products';
    renderProducts(loadedProducts);
}

function showGuide(key) {
    const clicked = [...document.querySelectorAll('.sidebar-link')].find(l => l.onclick?.toString().includes(key) || l.getAttribute('onclick')?.includes(key));
    setActiveLink(clicked);

    const guide = guidesData[key];
    const el = document.getElementById('content');

    if (!guide || key.startsWith('__product_')) {
        const productName = key.startsWith('__product_') ? (loadedProducts.find(p => '__product_' + (p._id || p.id) === key)?.name || 'Product') : key;
        document.querySelector('.main-header h1').textContent = productName + ' Guide';
        el.innerHTML = `
            <div class="guide-view">
                <div class="guide-header">
                    <h1>${productName} Guide</h1>
                    <p>No guide has been created for this product yet. Check back later or contact support.</p>
                </div>
            </div>`;
        return;
    }

    const title = guide.title || key;
    const subtitle = guide.subtitle || 'Complete setup — follow every step before your first launch.';
    document.querySelector('.main-header h1').textContent = title;
    const steps = guide.steps || [];

    if (steps.length === 0) {
        el.innerHTML = `<div class="guide-view"><div class="guide-header"><h1>${title}</h1><p>${guide.content || 'No guide content yet.'}</p></div></div>`;
        return;
    }

    const progressPct = Math.round((1 / steps.length) * 100);

    let html = '<div class="guide-view">';
    html += `<div class="guide-header"><h1>${title}</h1><p>${subtitle}</p></div>`;
    const PREV_ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
    const NEXT_ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
    html += `<div class="guide-tabs-wrapper"><div class="guide-tabs-scroll-row"><button class="guide-tab-arrow" id="guide-tab-prev" onclick="scrollGuideTabs(-1)">${PREV_ARROW}</button><div class="guide-tabs" id="guide-tabs">`;
    steps.forEach((s, i) => {
        const icon = s.icon ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${s.icon}</svg>` : '';
        html += `<button class="guide-tab ${i === 0 ? 'active' : ''}" onclick="switchGuideStep(${i}, '${key}')">${icon} ${s.tab || ('Step ' + (i+1))}</button>`;
    });
    html += `</div><button class="guide-tab-arrow" id="guide-tab-next" onclick="scrollGuideTabs(1)">${NEXT_ARROW}</button></div></div>`;
    html += `<div class="guide-progress"><div class="guide-progress-bar" id="guideProgress" style="width:${progressPct}%"></div></div>`;
    html += `<div id="guideStepContent">${renderGuideStep(steps[0], 0, steps.length)}</div>`;
    html += '</div>';
    el.innerHTML = html;
    initGuideTabArrows();
}

function scrollGuideTabs(dir) {
    const el = document.getElementById('guide-tabs');
    if (el) el.scrollBy({ left: dir * 200, behavior: 'smooth' });
}
function updateGuideTabArrows() {
    const t = document.getElementById('guide-tabs');
    const prev = document.getElementById('guide-tab-prev');
    const next = document.getElementById('guide-tab-next');
    if (!t || !prev || !next) return;
    prev.classList.toggle('visible', t.scrollLeft > 2);
    next.classList.toggle('visible', t.scrollLeft + t.clientWidth < t.scrollWidth - 2);
}
function initGuideTabArrows() {
    const t = document.getElementById('guide-tabs');
    if (!t) return;
    t.addEventListener('scroll', updateGuideTabArrows, { passive: true });
    window.addEventListener('resize', updateGuideTabArrows);
    setTimeout(updateGuideTabArrows, 50);
}
function switchGuideStep(idx, key) {
    const guide = guidesData[key];
    if (!guide || !guide.steps) return;
    const total = guide.steps.length;
    document.querySelectorAll('.guide-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
    const bar = document.getElementById('guideProgress');
    if (bar) bar.style.width = Math.round(((idx + 1) / total) * 100) + '%';
    document.getElementById('guideStepContent').innerHTML = renderGuideStep(guide.steps[idx], idx, total);
}

function renderGuideStep(step, idx, total) {
    let html = `<div class="guide-step-label"><span class="step-num">STEP ${idx + 1}</span><span class="step-of">OF ${total}</span></div>`;
    html += `<h2>${step.title || ''}</h2>`;
    if (step.description) html += `<p class="guide-desc">${step.description}</p>`;
    if (step.items && step.items.length) {
        html += '<ul>';
        step.items.forEach(item => { html += `<li>${item}</li>`; });
        html += '</ul>';
    }
    const imgs = step.images && step.images.length ? step.images : (step.image ? [step.image] : []);
    imgs.forEach(src => { html += `<img class="guide-img" src="${src}" alt="" loading="lazy" onclick="window.open(this.src,'_blank')">`; });
    if (step.info) html += `<div class="guide-info-box">${step.info}</div>`;
    if (step.link) html += `<a href="${step.link.url || '#'}" target="_blank" class="guide-dl-btn">${DL_SVG} ${step.link.text || 'Download'}</a>`;
    return html;
}

function renderProducts(products) {
    loadedProducts = products || [];
    showGuideLinks(loadedProducts);
    const el = document.getElementById('content');
    if (!products || products.length === 0) {
        el.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">${BOX_SVG}</div>
                <h2>No products yet</h2>
                <p>Redeem a license key to gain access to the loader.</p>
                <button class="empty-btn" onclick="openEmailModal()">
                    ${KEY_SVG}
                    Lookup by Email
                </button>
            </div>`;
        return;
    }

    el.innerHTML = '<div class="product-grid">' + products.map(p => {
        const name = p.name || 'Untitled';
        const desc = p.description ? p.description.replace(/<[^>]*>/g, '').substring(0, 100) : '';
        const img = p.image_url || p.cloudflare_image_id || '';
        const statusText = p.status_text || 'Available';
        const st = statusText.toLowerCase();
        const statusClass = (st.includes('updat') || st.includes('offline')) ? 'ps-yellow' : 'ps-green';
        const dlLink = p.download_link || '';
        const variants = p.variants || [];
        const badgeText = p.badge_text || '';
        const purchased = p.purchased_at ? new Date(p.purchased_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';

        let imgHtml = img
            ? `<div class="product-icon"><img src="${img}" alt=""></div>`
            : `<div class="product-icon">${BOX_SVG}</div>`;

        let btnHtml;
        if (st.includes('updat')) {
            btnHtml = `<button class="dl-btn" style="background:rgba(255,255,255,0.04);color:#444458;cursor:default;">Updating...</button>`;
        } else if (dlLink) {
            btnHtml = `<a href="${dlLink}" target="_blank" class="dl-btn">${DL_SVG} Download</a>`;
        } else {
            btnHtml = `<button class="dl-btn">${DL_SVG} Download</button>`;
        }

        let tagsHtml = '';
        if (badgeText) tagsHtml += `<span class="ptag">${badgeText}</span>`;
        variants.forEach(v => { if (v.name) tagsHtml += `<span class="ptag">${v.name}</span>`; });

        return `
            <div class="product-card">
                <div class="product-top">
                    ${imgHtml}
                    <div class="product-status ${statusClass}"><span class="dot"></span>${statusText}</div>
                </div>
                <div class="product-name">${name}</div>
                <div class="product-desc">${desc}</div>
                <div class="product-meta">
                    ${purchased ? `<span class="pm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>${purchased}</span>` : ''}
                </div>
                <div class="product-bottom">
                    <div class="product-tags">${tagsHtml}</div>
                    ${btnHtml}
                </div>
            </div>`;
    }).join('') + '</div>';
}

function updateUser(data) {
    user = data;
    document.getElementById('userName').textContent = data.global_name || data.username || data.email || 'Guest';
    document.getElementById('userSub').textContent = data.email ? 'Authenticated' : 'Email lookup';
    if (data.avatar) {
        document.getElementById('userAvatar').innerHTML = `<img src="${data.avatar}" alt="">`;
    } else {
        document.getElementById('userAvatar').textContent = (data.global_name || data.username || '?')[0].toUpperCase();
    }
}

async function loadProducts() {
    try {
        const res = await fetch('/api/my-products', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) { signOut(); return; }
        const data = await res.json();
        renderProducts(data.products || []);
    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading-spinner">Failed to load products.</div>';
    }
}

async function doLookup() {
    const email = document.getElementById('lookupEmail').value.trim();
    if (!email) return;
    closeModal();
    document.getElementById('content').innerHTML = '<div class="loading-spinner">Looking up products...</div>';

    try {
        const res = await fetch('/api/lookup', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        renderProducts(data.products || []);
    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading-spinner">Lookup failed. Try again.</div>';
    }
}

function openEmailModal() { document.getElementById('emailModal').classList.add('show'); document.getElementById('lookupEmail').focus(); }
function closeModal() { document.getElementById('emailModal').classList.remove('show'); }

function signOut() {
    localStorage.removeItem('od_token');
    window.location.href = '/';
}

async function changeEmail() {
    if (!confirm('Remove your current email and look up a different one?')) return;
    try {
        await fetch('/api/clear-email', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
    } catch (e) {}
    loadedProducts = [];
    showGuideLinks([]);
    setActiveLink(document.querySelector('.sidebar-link'));
    document.querySelector('.main-header h1').textContent = 'My Products';
    document.getElementById('userSub').textContent = 'Email lookup';
    showEmailPrompt();
}

(async () => {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    await loadGuides();

    if (params.has('token')) {
        token = params.get('token');
        localStorage.setItem('od_token', token);
        history.replaceState(null, '', '/dashboard');
    } else if (params.has('email')) {
        const email = params.get('email');
        history.replaceState(null, '', '/dashboard');
        token = 'email_' + btoa(email);
        localStorage.setItem('od_token', token);
        updateUser({ email, global_name: email.split('@')[0] });
        document.getElementById('content').innerHTML = '<div class="loading-spinner">Looking up your products...</div>';
        try {
            const res = await fetch('/api/lookup', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            if (res.status === 401) {
                renderProducts([]);
            } else {
                const data = await res.json();
                renderProducts(data.products || []);
            }
        } catch(e) { renderProducts([]); }
        return;
    } else {
        token = localStorage.getItem('od_token') || '';
    }

    if (!token) { window.location.href = '/'; return; }

    try {
        const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token }});
        if (res.ok) {
            const data = await res.json();
            updateUser(data);
            if (data.saved_email) {
                // Auto-load products with saved email
                try {
                    const lookupRes = await fetch('/api/lookup', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: data.saved_email })
                    });
                    if (lookupRes.ok) {
                        const lookupData = await lookupRes.json();
                        renderProducts(lookupData.products || []);
                    } else {
                        showEmailPrompt();
                    }
                } catch(e) { showEmailPrompt(); }
            } else {
                showEmailPrompt();
            }
        } else {
            localStorage.removeItem('od_token');
            window.location.href = '/';
        }
    } catch(e) {
        showEmailPrompt();
    }
})();
</script>
</body>
</html>
