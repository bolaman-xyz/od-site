<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | OD</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0c0e1a; color: #c4c4d4;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .bg {
            position: fixed; inset: 0;
            background:
                linear-gradient(rgba(12,14,26,0.95), rgba(12,14,26,0.95)),
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
            z-index: 0;
        }
        .glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(101,40,204,0.08) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
            background: rgba(15,17,30,0.9);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 44px 36px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card h1 {
            font-size: 24px; font-weight: 800; color: #fff;
            margin-bottom: 8px;
        }
        .card p {
            font-size: 13.5px; color: #4e4f63; margin-bottom: 32px;
            line-height: 1.5;
        }
        .discord-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px;
            background: #5865F2;
            color: #fff; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, transform 0.1s;
            text-decoration: none;
        }
        .discord-btn:hover { background: #4752c4; transform: translateY(-1px); }
        .discord-btn:active { transform: translateY(0); }
        .discord-btn svg { width: 22px; height: 22px; fill: #fff; }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 24px 0; color: #2a2b3d; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.04);
        }

        .email-form { display: flex; flex-direction: column; gap: 10px; }
        .email-form input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px; color: #d0d0de; font-size: 13px;
            font-family: inherit; outline: none;
            transition: border-color 0.15s;
        }
        .email-form input::placeholder { color: #33344a; }
        .email-form input:focus { border-color: rgba(139,92,246,0.3); }
        .email-btn {
            width: 100%; padding: 12px;
            background: rgba(139,92,246,0.12);
            border: 1px solid rgba(139,92,246,0.2);
            color: #a78bfa; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
        }
        .email-btn:hover { background: rgba(139,92,246,0.2); }

        .footer-text {
            margin-top: 24px; font-size: 11px; color: #2a2b3d;
        }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="glow"></div>

<div class="card">
    <h1>Sign in</h1>
    <p>Access your license and download the loader.</p>

    <a href="/auth/discord" class="discord-btn">
        <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
        Sign in with Discord
    </a>

    <div class="divider">or</div>

    <form class="email-form" onsubmit="emailLogin(event)">
        <input type="email" id="emailInput" placeholder="Enter your purchase email" required>
        <button type="submit" class="email-btn">Look up my products</button>
    </form>

    <div class="footer-text">By signing in you agree to our Terms of Service</div>
</div>

<script>
function emailLogin(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value;
    if (email) window.location.href = '/dashboard.html#email=' + encodeURIComponent(email);
}
</script>
</body>
</html>
